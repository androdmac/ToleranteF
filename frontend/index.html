<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f1eb;
            color: #333;
        }

        header {
            background-color: #4b2e2e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #6f4e37;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button:hover {
            background-color: #d9b99b;
        }

        .banner {
            height: 300px;
            background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 5px black;
            font-size: 40px;
            font-weight: bold;
        }

        .menu {
            padding: 40px;
        }

        .menu h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4b2e2e;
        }

        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 15px;
        }

        .card p {
            margin: 10px 0;
        }

        .card button {
            padding: 10px 15px;
            border: none;
            background-color: #6f4e37;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #4b2e2e;
        }

        #resultado {
            margin-top: 30px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }

        footer {
            margin-top: 40px;
            background-color: #4b2e2e;
            color: white;
            text-align: center;
            padding: 20px;
        }

    </style>
</head>
<body>

    <header>
        <h1>Cafetería </h1>
        
    </header>

    <nav>
        <button onclick="verUsuarios()">Usuarios</button>
        <button onclick="hacerPedido()">Pedidos</button>
        <button onclick="verInventario()">Inventario</button>
        <button onclick="verNotificaciones()">Notificaciones</button>
    </nav>

    <section class="banner">
        Bienvenido a la Cafetería
    </section>

    <section class="menu">

        <h2>Nuestro Menú</h2>

        <div class="productos">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" alt="Café">
                <h3>Café Americano</h3>
                <p>$45 MXN</p>
                <button onclick="hacerPedido()">Ordenar</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" alt="Capuccino">
                <h3>Capuccino</h3>
                <p>$60 MXN</p>
                <button onclick="hacerPedido()">Ordenar</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="Pan">
                <h3>Pan Dulce</h3>
                <p>$35 MXN</p>
                <button onclick="hacerPedido()">Ordenar</button>
            </div>

        </div>

        <div id="resultado"></div>

    </section>

    <footer>
        Proyecto - Cafetería 2026
    </footer>

    <script>

        async function hacerPedido() {

            try {

                const respuesta = await fetch(
                    'http://127.0.0.1:5001/pedido',
                    {
                        method: 'POST'
                    }
                );

                const datos = await respuesta.json();

                document.getElementById('resultado').innerText =
                    datos.mensaje;

            } catch(error) {

                document.getElementById('resultado').innerText =
                    'Error al conectar con el microservicio de pedidos';
            }
        }

        async function verUsuarios() {

            try {

                const respuesta = await fetch(
                    'http://127.0.0.1:5002/login'
                );

                const datos = await respuesta.json();

                document.getElementById('resultado').innerText =
                    datos.mensaje;

            } catch(error) {

                document.getElementById('resultado').innerText =
                    'Microservicio de usuarios no disponible';
            }
        }

        async function verInventario() {

            try {

                const respuesta = await fetch(
                    'http://127.0.0.1:5003/inventario'
                );

                const datos = await respuesta.json();

                document.getElementById('resultado').innerText =
                    `Café disponible: ${datos.cafe} | Pan disponible: ${datos.pan}`;

            } catch(error) {

                document.getElementById('resultado').innerText =
                    'Microservicio de inventario no disponible';
            }
        }

        async function verNotificaciones() {

            document.getElementById('resultado').innerText =
                'No hay nuevas notificaciones';
        }

    </script>

</body>
</html>
