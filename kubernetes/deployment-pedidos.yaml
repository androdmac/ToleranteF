apiVersion: apps/v1
kind: Deployment

metadata:
  name: pedidos

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pedidos

  template:
    metadata:
      labels:
        app: pedidos

    spec:
      containers:
      - name: pedidos
        image: pedidos-image
        ports:
        - containerPort: 5001